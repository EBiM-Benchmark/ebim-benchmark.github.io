    - generic [ref=f133e54]:
      - heading "Overview" [level=2] [ref=f133e56]
      - paragraph [ref=f133e57]:
        - text: Mobile manipulation, including bimanual coordination, is increasingly combined with foundation models and vision-language-action (VLA) systems. Yet the robotics community still lacks standardized benchmarks that validate these methods in real-world settings. Simulation results often fail to translate to robust deployment due to sim-to-real gaps, platform differences, and limited reproducibility. This workshop proposes a globally coordinated benchmarking initiative through a structured
        - strong [ref=f133e58]: three-phase plan
        - text: .
      - generic "Three-phase benchmark pipeline" [ref=f133e59]:
        - generic [ref=f133e60]:
          - generic [ref=f133e61]:
            - generic [ref=f133e67]: Phase I
            - heading "Open Simulation Benchmark" [level=3] [ref=f133e68]
            - paragraph [ref=f133e69]: "Release an open simulation benchmark focusing on unstructured manipulation scenarios: cable routing, deformable material handling (thermal pad placement), and assisted living and feeding tasks. Global teams participate through an open call on a shared, reproducible leaderboard."
          - generic [ref=f133e73]:
            - generic [ref=f133e84]: Phase II
            - heading "Cross-Continent Real-World Validation" [level=3] [ref=f133e85]
            - paragraph [ref=f133e86]: Teams advancing from simulation validate on real Mobile FR3 Duo robots at partner labs in Hamburg, Munich, Pittsburgh, and Shanghai. After simulation results are announced (Aug 8), qualifying teams get a hands-on bench-testing window on the real platform (Aug 10–19). Repository submissions are open now, since the developer-preview release; organizer-run simulation evaluation may begin at any time. From Aug 20–31, all real-robot bench testing and evaluation are run by the organizers — ensuring cross-site comparability.
          - generic [ref=f133e90]:
            - generic [ref=f133e98]: Phase III
            - heading "Workshop & Roadmap Release" [level=3] [ref=f133e99]
            - paragraph [ref=f133e100]: Competition results, invited talks, and a panel discussion are presented at a community workshop (venue and date TBD). The workshop releases the benchmark protocol, open dataset, and community roadmap for future iterations.
