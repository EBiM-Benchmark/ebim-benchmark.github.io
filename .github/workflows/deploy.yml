name: Deploy to GitHub Pages

# NOTE: Pushing this workflow does NOT change how Pages serves the site. It
# takes effect only after the repo's Pages "build and deployment" source is
# switched from "Deploy from a branch" to "GitHub Actions" (Settings → Pages).
# That switch is the Phase 0 cutover — perform it only after sign-off.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token + OIDC for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deployment at a time; let a newer push supersede an older.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Eleventy)
        run: npx @11ty/eleventy

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
