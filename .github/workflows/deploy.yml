name: Deploy to GitHub Pages

# Live deploy path: builds the site and deploys _site/ to GitHub Pages on
# every push to main. The repo's Pages "build and deployment" source is set to
# "GitHub Actions" (the Phase 0 cutover is complete).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token + OIDC for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deployment at a time; let a newer push supersede an older.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Eleventy)
        run: npx @11ty/eleventy

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
