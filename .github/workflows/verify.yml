name: Build & EN parity

# Permanent guard: builds the Eleventy site and asserts the English output is
# semantically identical to the golden fixtures in tests/baseline/
# (see scripts/verify.mjs). Runs on every PR.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + verify EN parity against the committed baseline
        run: node scripts/verify.mjs
