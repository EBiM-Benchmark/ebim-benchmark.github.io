name: Build & EN parity

# Permanent guard: builds the Eleventy site and asserts the English output is
# semantically identical to the golden fixtures in tests/baseline/
# (see scripts/verify.mjs). The second step verifies the unpublished /zh/
# Simplified-Chinese preview (noindex, no sitemap entry, no hreflang, localized
# links, CJK body — see scripts/verify-zh.mjs) against the _site that the first
# step already built. Runs on every PR and on pushes to main.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + verify EN parity against the committed baseline
        run: node scripts/verify.mjs

      - name: Verify /zh/ preview (noindex, no sitemap/hreflang, localized, CJK)
        run: node scripts/verify-zh.mjs --no-build
