name: Build & EN parity

# Permanent guard: builds the Eleventy site and asserts the English output is
# semantically identical to the golden fixtures in tests/baseline/
# (see scripts/verify.mjs). The second step verifies the /zh/ Simplified-Chinese
# locale against the _site the first step built — its assertions are gated on
# site.zhPublished, so it checks the published invariants (no noindex, reciprocal
# hreflang on the index/competition pairs, /zh/ present in sitemap) while the flag
# is true and the unpublished ones while false (see scripts/verify-zh.mjs). Runs
# on every PR and on pushes to main.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + verify EN parity against the committed baseline
        run: node scripts/verify.mjs

      - name: Verify /zh/ locale (state-gated on zhPublished — hreflang/sitemap/noindex/CJK)
        run: node scripts/verify-zh.mjs --no-build
