name: Build & EN parity

# Permanent guard: builds the Eleventy site and asserts the English output is
# semantically identical to the golden fixtures in tests/baseline/
# (see scripts/verify.mjs). The second step verifies the /zh/ Simplified-Chinese
# locale against the _site the first step built — its assertions are gated PER
# PAGE on site.zhPublished[i18nKey], so each page is checked against its own flag.
# As of Phase 2c all four /zh/ pages are published, so each is asserted against
# the published invariants (no noindex, reciprocal hreflang, /zh/ in sitemap,
# language toggle); the harness stays dual-state, so returning any flag to false
# re-asserts that page's draft invariants (see scripts/verify-zh.mjs). Runs on
# every PR and on pushes to main.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + verify EN parity against the committed baseline
        run: node scripts/verify.mjs

      - name: Verify /zh/ locale (per-page gated on zhPublished — hreflang/sitemap/noindex/toggle/CJK)
        run: node scripts/verify-zh.mjs --no-build
