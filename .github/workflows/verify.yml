name: Verify Phase 0 parity

# Gate for the Phase 0 migration: builds the Eleventy site and asserts the
# output is semantically identical to the hand-authored HTML on `main`
# (see scripts/verify-phase0.mjs). Runs on every PR and on the migration branch.

on:
  pull_request:
  push:
    branches: [phase0-eleventy]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — the harness diffs against the base ref)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + verify parity against the committed baseline
        run: node scripts/verify-phase0.mjs
        env:
          # The harness builds the site itself, then compares to this ref.
          BASE_REF: origin/main
